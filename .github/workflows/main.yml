name: Compile SAMP

on:
  push:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pawncc
        run: |
          wget https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-linux.tar.gz
          tar -xzf pawnc-3.10.10-linux.tar.gz

      - name: Compile
        run: |
          export LD_LIBRARY_PATH=$PWD/pawnc-3.10.10-linux/lib:$LD_LIBRARY_PATH
          pawnc-3.10.10-linux/bin/pawncc -i$PWD/pawno/include gamemodes/LVRP.pwn -o gamemodes/LVRP.amx -w0

      - name: Upload AMX
        uses: actions/upload-artifact@v4
        with:
          name: LVRP-amx
          path: gamemodes/LVRP.amx
