name: Compile SAMP

on:
  push:
    branches: [ main, master ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download pawncc
        run: |
           pawncc -i$PWD/pawno/include gamemodes/LVRP.pwn -w0
      - name: Compile
        run: |
          pawnc-3.10.10-linux/bin/pawncc gamemodes/LVRP.pwn -i pawno/include -o gamemodes/LVRP.amx

      - name: Upload AMX
        uses: actions/upload-artifact@v4
        with:
          name: LVRP-amx
          path: gamemodes/LVRP.amx
